name: Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Lint with flake8
        run: flake8 DataRetrieval.py tests/

      - name: Run unit tests and generate HTML report
        env:
          CI: "true"
          AWS_ACCESS_KEY_ID: "testing"
          AWS_SECRET_ACCESS_KEY: "testing"
          AWS_SESSION_TOKEN: "testing"
          AWS_DEFAULT_REGION: "ap-southeast-2"
        run: pytest tests/test_utils.py --html=tests/unit-test-report.html

      - name: Run integration tests and generate HTML report
        if: always()
        env:
          CI: "true"
          # Dummy credentials — DynamoDB is fully mocked in tests
          AWS_ACCESS_KEY_ID: "testing"
          AWS_SECRET_ACCESS_KEY: "testing"
          AWS_SESSION_TOKEN: "testing"
          AWS_DEFAULT_REGION: "ap-southeast-2"
        run: pytest tests/test_api.py --html=tests/integration-test-report.html

      - name: Install Playwright and Chromium
        if: always()
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Convert HTML reports to PDF
        if: always()
        run: |
          python3 -c "
          from playwright.sync_api import sync_playwright
          import os
          with sync_playwright() as p:
              browser = p.chromium.launch()
              for name in ['unit-test-report', 'integration-test-report']:
                  page = browser.new_page()
                  page.goto('file://' + os.path.abspath(f'tests/{name}.html'))
                  page.wait_for_load_state('networkidle')
                  page.pdf(path=f'tests/{name}.pdf', format='A4', print_background=True)
              browser.close()
          "

      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: tests/unit-test-report.pdf

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: tests/integration-test-report.pdf

  deploy:
    name: Deploy to AWS Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - run: sam build

      - run: sam deploy --stack-name Ghostie-data-retrieval --resolve-s3 --capabilities CAPABILITY_IAM --no-fail-on-empty-changeset
