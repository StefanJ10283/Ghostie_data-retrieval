name: Test and Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install application dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Install system dependencies for WeasyPrint
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Run tests and generate HTML report
        env:
          CI: "true"
          # Dummy credentials — DynamoDB is fully mocked in tests
          AWS_ACCESS_KEY_ID: "testing"
          AWS_SECRET_ACCESS_KEY: "testing"
          AWS_SESSION_TOKEN: "testing"
          AWS_DEFAULT_REGION: "ap-southeast-2"
        run: pytest

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: tests/test-report.pdf

  deploy:
    name: Deploy to AWS Lambda
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ap-southeast-2

      - uses: aws-actions/setup-sam@v2

      - run: sam build

      - run: sam deploy --stack-name Ghostie-data-retrieval --resolve-s3 --capabilities CAPABILITY_IAM --no-fail-on-empty-changeset
